name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  bump:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Extract tag and version
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../nucleo-${{ matrix.target }}.tar.gz nucleo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nucleo-${{ matrix.target }}
          path: nucleo-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          # Get auto-generated changelog from previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          # Write to file to preserve newlines
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ needs.bump.outputs.tag }}"
          VERSION="${{ needs.bump.outputs.version }}"
          CHANGELOG=$(cat /tmp/changelog.txt)

          gh release create "${TAG}" \
            --title "nucleo ${TAG}" \
            --notes "## nucleo ${VERSION}

          ### What's Changed

          ${CHANGELOG}

          ### Install

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/${GH_REPO}/main/install.sh | sh
          \`\`\`

          Or download a binary below and add it to your PATH.

          ### Binaries

          | File | Platform |
          |------|----------|
          | \`nucleo-x86_64-apple-darwin.tar.gz\`       | macOS Intel         |
          | \`nucleo-aarch64-apple-darwin.tar.gz\`      | macOS Apple Silicon |
          | \`nucleo-x86_64-unknown-linux-gnu.tar.gz\`  | Linux x86_64        |
          | \`nucleo-aarch64-unknown-linux-gnu.tar.gz\` | Linux ARM64         |
          " \
            artifacts/nucleo-x86_64-apple-darwin.tar.gz \
            artifacts/nucleo-aarch64-apple-darwin.tar.gz \
            artifacts/nucleo-x86_64-unknown-linux-gnu.tar.gz \
            artifacts/nucleo-aarch64-unknown-linux-gnu.tar.gz

          echo "Released: https://github.com/${GH_REPO}/releases/tag/${TAG}" >> "$GITHUB_STEP_SUMMARY"
